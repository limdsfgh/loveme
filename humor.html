<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绝对的幽默！✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=ZCOOL+KuaiLe&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --color-green: #BBFF16;
            --color-purple: #8A67F9;
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Nunito', 'ZCOOL KuaiLe', sans-serif;
            background-color: var(--color-purple);
            color: var(--color-white);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            width: 90%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
            padding: 40px 0;
        }

        /* === 左侧文字区块 === */
        .text-content {
            flex: 1;
        }

        .text-content h1 {
            font-size: 3.5em;
            color: var(--color-green);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .text-content p {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn {
            background-color: var(--color-green);
            color: #333333;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(187, 255, 22, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--color-white);
            color: var(--color-purple);
            transform: translateY(-5px);
        }

        /* === 右侧照片区块 === */
        .image-content {
            flex: 1;
            text-align: center;
        }

        .image-content img {
            width: 100%;
            max-width: 450px;
            max-height: 550px;
            /* 限制照片最高只能有 550px */
            object-fit: cover;
            /* 像相框一样，保持照片原有比例，多出来的部分自动隐藏，绝不变形！ */
            /* 👆 新加的这两行魔法 👆 */
            border-radius: 30px;
            border: 8px solid var(--color-green);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }

        .image-content img:hover {
            transform: scale(1.05) rotate(-4deg);
            /* 幽默页面的照片悬浮效果稍微夸张一点点 */
        }

        /* === 点击看大图的黑底弹窗 (Modal) === */
        #imgModal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            
        }

        #imgModal img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 20px;
            border: 5px solid var(--color-white);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        /* === 响应式设计 (平板和手机端) === */
        @media (max-width: 800px) {
            .container {
                /* 恢复成美貌页面的反转排列，实现手机端上图下字 */
                flex-direction: column-reverse;
                text-align: center;
            }

            .image-content img {
                max-width: 80%;
                margin-bottom: 10px;
                
            }

            .text-content h1 {
                font-size: 2.5em;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="text-content">
            <h1>为什么是幽默？😆</h1>
            <p>
                俗话说得好 好看的皮囊千篇一律 有趣的灵魂万里挑一<br><br>
                我其实只是表面抽象神经 但我在学校是沉鱼落雁闭月羞花倾国倾城国色天香天生丽质霸气侧漏邪魅狂拽冰肌玉肤智商超群极具魅力温文尔雅风度翩翩彬彬有礼威风堂堂天下无双眉清目秀吹弹可破人面桃花英俊潇洒气宇不凡玉树临风仪表堂堂风流倜傥面如冠玉美目盼兮清新俊逸酷到爆人见人爱花见花开车见车爆胎大气上档次高智商有魅力思想崇高堪称二十一世纪列奥纳多达芬奇梵高高斯李白且琴棋书画样样精通的人
            </p>
            <button class="btn" onclick="window.location.href='index.html#photos'">返回主页</button>
        </div>

        <div class="image-content">
            <img src="img/sohai2.jpeg"  alt="幽默的照片" onclick="openFullscreen()">
        </div>

    </div>

    <div id="imgModal" onclick="closeFullscreen()">
        <span class="close-btn">&times;</span>
        <img src="img/sohai2.jpeg"  id="fullscreenImg" alt="大图">
    </div>

    <script>
        function openFullscreen() {
            const modal = document.getElementById("imgModal");
            modal.style.display = "flex";
        }

        function closeFullscreen() {
            const modal = document.getElementById("imgModal");
            modal.style.display = "none";
        }
    </script>

</body>

</html>
