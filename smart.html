<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闪光的智慧！✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=ZCOOL+KuaiLe&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --color-green: #BBFF16;
            --color-purple: #8A67F9;
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Nunito', 'ZCOOL KuaiLe', sans-serif;
            background-color: var(--color-purple);
            color: var(--color-white);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            width: 90%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
            padding: 40px 0;
        }

        /* === 照片区块 === */
        .image-content {
            flex: 1;
            text-align: center;
        }

        .image-content img {
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            border: 8px solid var(--color-green);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }

        .image-content img:hover {
            transform: scale(1.03) rotate(2deg);
            /* 这里我改成了向右歪头，和 beauty 页面区分开 */
        }

        /* === 文字区块 === */
        .text-content {
            flex: 1;
        }

        .text-content h1 {
            font-size: 3.5em;
            color: var(--color-green);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .text-content p {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn {
            background-color: var(--color-green);
            color: #333333;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(187, 255, 22, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--color-white);
            color: var(--color-purple);
            transform: translateY(-5px);
        }

        /* === 点击看大图的黑底弹窗 (Modal) === */
        #imgModal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        #imgModal img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 20px;
            border: 5px solid var(--color-white);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        /* === 响应式设计 (平板和手机端) === */
        @media (max-width: 800px) {
            .container {
                /* 【关键修改】：这里直接用 column！因为 HTML 里照片就在前面，所以会自动变成上图下字 */
                flex-direction: column;
                text-align: center;
            }

            .image-content img {
                max-width: 80%;
                margin-bottom: 10px;
            }

            .text-content h1 {
                font-size: 2.5em;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="image-content">
            <img src="img/sohai.jpeg" alt="智慧的照片" onclick="openFullscreen()">
        </div>

        <div class="text-content">
            <h1>为什么是智慧？🧠</h1>
            <p>
                我不仅长得好看 还特别聪明<br><br>
                才高八斗学富五车还低调做人
                举一反三触类旁通脑子一直在线
                过目不忘一点就通还懒得炫耀
                运筹帷幄见微知著主打一个稳
                思路清奇逻辑严谨偶尔还很幽默
                一点就透反应神速脑袋持续发光
                才思敏捷妙语连珠随便讲都很有道理
            </p>
            <button class="btn" onclick="window.location.href='index.html#photos'">返回主页</button>
        </div>

    </div>

    <div id="imgModal" onclick="closeFullscreen()">
        <span class="close-btn">&times;</span>
        <img src="img/sohai.jpeg" id="fullscreenImg" alt="大图">
    </div>

    <script>
        function openFullscreen() {
            const modal = document.getElementById("imgModal");
            modal.style.display = "flex";
        }

        function closeFullscreen() {
            const modal = document.getElementById("imgModal");
            modal.style.display = "none";
        }
    </script>

</body>

</html>
